name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish extension
    runs-on: ubuntu-latest
    # Map the publish tokens to job env so the steps below can skip themselves
    # when a token is not configured (e.g. a manual-upload release, or before
    # one marketplace is set up). A `v*` tag is then always safe to push.
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prefer HTTPS for Git dependencies
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
          git config --global url."https://github.com/".insteadOf git@github.com:

      - run: npm ci

      - run: npm run build

      # Package once WITH dependencies. The extension is not bundled: the preview
      # imports @markup-carve/carve at runtime and the language server loads from
      # node_modules/@markup-carve/carve-lsp, so --no-dependencies would ship a
      # broken vsix. vsce omits devDependencies automatically; the webview libs
      # (mermaid/katex/highlight.js/chart.js) ship as prebuilt copies in media/.
      - name: Package extension
        run: npx vsce package --out vscode-carve.vsix

      - name: Upload the packaged vsix as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-carve-vsix
          path: vscode-carve.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --packagePath vscode-carve.vsix

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish vscode-carve.vsix
